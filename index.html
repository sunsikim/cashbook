<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#0d0d0d">
<title>카드내역 → Notion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --surface3: #252525;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent2: #60f0c8;
    --accent3: #f0a060;
    --text: #f0f0e8;
    --muted: #666;
    --danger: #f06060;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body { height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(var(--safe-top) + 28px) 18px calc(var(--safe-bottom) + 32px);
    background-image:
      radial-gradient(ellipse 70% 40% at 85% 5%, rgba(200,240,96,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 5% 95%, rgba(96,240,200,0.04) 0%, transparent 60%);
  }

  /* ── Header ── */
  header {
    width: 100%; max-width: 480px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px;
  }

  .app-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    box-shadow: 0 0 28px rgba(200,240,96,0.28);
  }

  .header-text h1 {
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.3px; line-height: 1.1;
  }

  .header-text h1 span { color: var(--accent); }
  .header-text p {
    font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace; margin-top: 2px;
  }

  #creds-badge {
    display: none; font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: rgba(200,240,96,0.1);
    border: 1px solid rgba(200,240,96,0.25);
    color: var(--accent); padding: 2px 7px;
    border-radius: 20px; margin-left: 4px;
  }

  /* Install hint */
  #install-banner {
    display: none;
    width: 100%; max-width: 480px;
    background: rgba(200,240,96,0.07);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 10px; padding: 11px 14px;
    margin-bottom: 14px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--accent); line-height: 1.6;
  }

  /* ── Steps ── */
  .steps {
    display: flex; gap: 6px;
    width: 100%; max-width: 480px; margin-bottom: 20px;
  }
  .step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .step.active { background: var(--accent); }
  .step.done { background: var(--accent2); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%; max-width: 480px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  label {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--muted); margin-bottom: 5px; display: block;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px; outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: #444; }

  .field-gap { margin-top: 12px; }

  .toggle-row { display: flex; justify-content: flex-end; margin-top: 4px; }
  .toggle-pw {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 11px;
    font-family: 'DM Mono', monospace; padding: 0;
  }

  .save-row {
    display: flex; align-items: center; gap: 8px; margin-top: 14px;
    font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
  }
  .save-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); }

  /* ── Capture ── */
  #capture-grid { margin-bottom: 14px; }

  .capture-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 12px; text-align: center;
    cursor: pointer; transition: all 0.18s;
    position: relative; overflow: hidden;
  }
  .capture-btn:active { border-color: var(--accent); background: rgba(200,240,96,0.06); }
  .capture-btn input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0;
  }
  .capture-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .capture-label { font-size: 13px; font-weight: 700; display: block; }
  .capture-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; display: block; margin-top: 2px; }

  #preview-img {
    width: 100%; border-radius: 10px;
    max-height: 240px; object-fit: contain;
    background: var(--surface2);
    display: none; margin-bottom: 10px;
  }

  .retake-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 7px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 6px 12px; cursor: pointer;
    margin-bottom: 12px; display: none;
  }
  .retake-btn:active { color: var(--accent); border-color: var(--accent); }

  /* ── Extracted items ── */
  #items-list { display: flex; flex-direction: column; gap: 10px; }

  .item-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    animation: slideIn 0.25s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 12px;
  }

  .item-num {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--accent2); letter-spacing: 0.08em;
  }

  .item-delete {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 0;
    line-height: 1;
  }
  .item-delete:active { color: var(--danger); }

  .item-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  .item-field { display: flex; flex-direction: column; gap: 4px; }
  .item-field.full { grid-column: 1 / -1; }

  .item-field label {
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin: 0;
  }

  .item-field input, .item-field select {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 600;
    outline: none;
    -webkit-appearance: none;
    width: 100%;
  }
  .item-field input:focus, .item-field select:focus { border-color: var(--accent); }

  .category-badge {
    display: inline-block;
    font-size: 10px; font-family: 'DM Mono', monospace;
    padding: 2px 8px; border-radius: 20px;
    background: rgba(200,240,96,0.12);
    border: 1px solid rgba(200,240,96,0.25);
    color: var(--accent); margin-left: 6px;
  }

  /* ── Buttons ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px; border-radius: 10px; border: none;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
    cursor: pointer; transition: all 0.18s; width: 100%; margin-top: 14px;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: #0d0d0d; }
  .btn-primary:active:not(:disabled) { background: #b8e050; transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); margin-top: 8px; font-size: 13px;
  }
  .btn-outline:active { border-color: var(--accent); color: var(--accent); }

  /* ── Status ── */
  .status-bar {
    display: none; padding: 11px 14px; border-radius: 8px;
    font-size: 12px; font-family: 'DM Mono', monospace;
    margin-top: 10px; align-items: center; gap: 10px; line-height: 1.5;
  }
  .status-bar.info    { display: flex; background: rgba(96,200,240,0.1);  border: 1px solid rgba(96,200,240,0.3);  color: var(--accent2); }
  .status-bar.success { display: flex; background: rgba(200,240,96,0.1);  border: 1px solid rgba(200,240,96,0.3);  color: var(--accent); }
  .status-bar.error   { display: flex; background: rgba(240,96,96,0.1);   border: 1px solid rgba(240,96,96,0.3);   color: var(--danger); }
  .status-bar.warn    { display: flex; background: rgba(240,160,96,0.1);  border: 1px solid rgba(240,160,96,0.3);  color: var(--accent3); }

  .spinner {
    width: 15px; height: 15px; border: 2px solid currentColor;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Progress bar for batch save ── */
  .progress-wrap {
    display: none; margin-top: 14px;
    background: var(--surface2); border-radius: 8px; overflow: hidden; height: 6px;
  }
  .progress-bar {
    height: 100%; background: var(--accent);
    border-radius: 8px; width: 0%;
    transition: width 0.4s ease;
  }

  /* ── Result list ── */
  #result-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 12px; font-family: 'DM Mono', monospace;
  }
  .result-row.ok   { border-color: rgba(200,240,96,0.3); }
  .result-row.fail { border-color: rgba(240,96,96,0.3);  color: var(--danger); }
  .result-row a { color: var(--accent); text-decoration: none; font-size: 11px; }

  .sep { height: 1px; background: var(--border); margin: 16px 0; }
  .hint {
    font-size: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace; line-height: 1.7; margin-top: 10px;
  }
  .hint a { color: var(--accent2); text-decoration: none; }

  /* Date info bar */
  .date-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    background: rgba(96,240,200,0.07);
    border: 1px solid rgba(96,240,200,0.2);
    margin-bottom: 12px; font-size: 12px;
    font-family: 'DM Mono', monospace; color: var(--accent2);
  }
</style>
</head>
<body>

<header>
  <div class="app-icon">💳</div>
  <div class="header-text">
    <h1>카드내역 <span>→</span> Notion</h1>
    <p>// 매일 저녁 카드 지출 자동 기록 <span id="creds-badge">✓ 저장됨</span></p>
  </div>
</header>

<div id="install-banner">
  📲 <strong>홈 화면에 추가</strong>하면 앱처럼 사용 가능합니다<br>
  Safari에서 <strong>공유 ↑</strong> → "홈 화면에 추가" 탭
</div>

<div class="steps">
  <div class="step active" id="step1"></div>
  <div class="step" id="step2"></div>
  <div class="step" id="step3"></div>
</div>

<!-- ① Config -->
<div class="card" id="config-card">
  <div class="card-title">① Notion 설정</div>
  <div>
    <label>Integration Token</label>
    <input type="password" id="notion-token" placeholder="secret_xxxxxxxxxxxx" autocomplete="off" />
    <div class="toggle-row">
      <button class="toggle-pw" onclick="togglePw()">표시 / 숨기기</button>
    </div>
  </div>
  <div class="field-gap">
    <label>Database ID</label>
    <input type="text" id="notion-db" placeholder="Notion URL의 32자리 코드" autocomplete="off" />
  </div>
  <div class="save-row">
    <input type="checkbox" id="save-creds" checked />
    <label for="save-creds" style="margin:0;font-size:12px;color:var(--muted)">이 기기에 저장</label>
  </div>
  <p class="hint">
    토큰: <a href="https://notion.so/my-integrations" target="_blank">notion.so/my-integrations</a> → 새 통합 → 시크릿 복사<br>
    DB ID: Notion DB URL에서 "?v=" 앞의 32자리 문자열
  </p>
</div>

<!-- ② Upload -->
<div class="card" id="upload-card">
  <div class="card-title">② 카드 내역 이미지 업로드</div>

  <img id="preview-img" alt="내역 미리보기" />
  <button class="retake-btn" id="retake-btn" onclick="retake()">↩ 다시 선택</button>

  <div id="capture-grid">
    <div class="capture-btn">
      <input type="file" id="file-library" accept="image/*" />
      <span class="capture-icon">🖼️</span>
      <span class="capture-label">스크린샷 선택</span>
      <span class="capture-sub">앨범에서 카드 내역 이미지 선택</span>
    </div>
  </div>

  <button class="btn btn-primary" id="scan-btn" disabled onclick="scanImage()">
    ✦ AI로 내역 분석
  </button>
  <div class="status-bar" id="scan-status"></div>
</div>

<!-- ③ Review & Save -->
<div class="card" id="data-card" style="display:none">
  <div class="card-title">③ 항목 확인 및 저장</div>

  <div id="date-bar" class="date-bar">📅 <span id="detected-date">날짜 감지 중…</span></div>
  <div id="items-list"></div>

  <div class="sep"></div>
  <button class="btn btn-primary" id="save-btn" onclick="saveAll()">
    ✦ Notion에 전체 저장
  </button>
  <button class="btn btn-outline" onclick="addBlankItem()">+ 항목 추가</button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div id="result-list"></div>
  <div class="status-bar" id="save-status"></div>
</div>

<script>
// ── Categories (edit this list to match your Notion DB) ──────────────
const CATEGORIES = [
  '생활비', '여행비', '유틸리티', '패션', '식비/술값',
  '자기계발', '안경/렌즈', '교통비', '정기결제'
];

// ── State ─────────────────────────────────────────────────────────────
let fileBase64 = null;
let fileType   = null;
let items      = [];      // [{name, date, amount, category}]
let detectedDate = '';

// ── Credential persistence ────────────────────────────────────────────
function loadCreds() {
  try {
    const t = localStorage.getItem('rtn_token');
    const d = localStorage.getItem('rtn_db');
    if (t) document.getElementById('notion-token').value = t;
    if (d) document.getElementById('notion-db').value = d;
    if (t || d) document.getElementById('creds-badge').style.display = 'inline';
  } catch(e) {}
}

function saveCreds() {
  if (!document.getElementById('save-creds').checked) return;
  try {
    const t = document.getElementById('notion-token').value.trim();
    const d = document.getElementById('notion-db').value.trim();
    if (t) localStorage.setItem('rtn_token', t);
    if (d) localStorage.setItem('rtn_db', d);
    document.getElementById('creds-badge').style.display = 'inline';
  } catch(e) {}
}

loadCreds();

// PWA install hint
if (!window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone) {
  document.getElementById('install-banner').style.display = 'block';
}

// ── Helpers ───────────────────────────────────────────────────────────
function togglePw() {
  const t = document.getElementById('notion-token');
  t.type = t.type === 'password' ? 'text' : 'password';
}

function setStep(n) {
  ['step1','step2','step3'].forEach((id, i) => {
    document.getElementById(id).className =
      'step' + (i < n-1 ? ' done' : i === n-1 ? ' active' : '');
  });
}

function showStatus(id, type, html, spin = false) {
  const el = document.getElementById(id);
  el.className = 'status-bar ' + type;
  el.innerHTML = (spin ? '<div class="spinner"></div>' : '') + `<span>${html}</span>`;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── File handling ─────────────────────────────────────────────────────
  document.getElementById('file-library').addEventListener('change', function() {
    if (this.files[0]) handleFile(this.files[0]);
  });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    fileBase64 = dataUrl.split(',')[1];
    fileType   = file.type || 'image/jpeg';

    const img = document.getElementById('preview-img');
    img.src = dataUrl; img.style.display = 'block';
    document.getElementById('capture-grid').style.display = 'none';
    document.getElementById('retake-btn').style.display = 'inline-block';
    document.getElementById('scan-btn').disabled = false;
    setStep(2);
  };
  reader.readAsDataURL(file);
}

function retake() {
  fileBase64 = null; fileType = null; items = [];
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('capture-grid').style.display = 'grid';
  document.getElementById('retake-btn').style.display = 'none';
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-status').className = 'status-bar';
  document.getElementById('data-card').style.display = 'none';
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('file-library').value = '';
  setStep(1);
}

// ── Scan ──────────────────────────────────────────────────────────────
async function scanImage() {
  const token = document.getElementById('notion-token').value.trim();
  const dbId  = document.getElementById('notion-db').value.trim();
  if (!token || !dbId) {
    showStatus('scan-status', 'error', '⚠ Notion 토큰과 DB ID를 먼저 입력해주세요.');
    return;
  }
  if (!fileBase64) return;
  saveCreds();

  document.getElementById('scan-btn').disabled = true;
  showStatus('scan-status', 'info', '카드 내역을 분석하는 중…', true);

  const catList = CATEGORIES.join(', ');
  const today   = todayStr();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: fileType, data: fileBase64 } },
            { type: "text", text: `This is a Korean credit card transaction list screenshot.
Today's date is ${today}.
In the image, '오늘' means today (${today}).

Extract ALL transactions listed. For each transaction extract:
- name: merchant/item name (keep original Korean/English)
- date: in YYYY-MM-DD format. If the image says '오늘', use ${today}
- amount: numeric only (no commas, no 원 symbol), e.g. 325270
- category: pick the BEST match from this list: [${catList}]
  Use these context clues to pick the best category:
  - 교통비: 티머니, 버스, 지하철, 택시, KTX, SRT, 우버, 카카오T
  - 식비/술값: 식당, 카페, 배달, 편의점, 마트, 스타벅스, 맥도날드, 치킨, 술집, 이자카야
  - 생활비: 마트, 다이소, 생활용품, 청소, 세탁, 약국, 병원, 의료
  - 자기계발: 책, 강의, 학원, 교육, CLAUDE, AI, ChatGPT, 노션, 앱, 소프트웨어
  - 정기결제: 구독, subscription, Netflix, 유튜브 프리미엄, Spotify, 월정액, 보험, 통신비
  - 패션: 옷, 신발, 가방, 의류, 쇼핑몰, 무신사, 지그재그, 올리브영, 화장품
  - 안경/렌즈: 안경, 렌즈, 선글라스, 안경원
  - 여행비: 호텔, 숙박, 항공, 여행, 에어비앤비, 투어
  - 유틸리티: 전기, 가스, 수도, 인터넷, 통신, 관리비

Respond ONLY with a JSON object, no markdown:
{
  "date_label": "오늘 (${today})",
  "transactions": [
    {"name": "...", "date": "YYYY-MM-DD", "amount": 12345, "category": "..."},
    ...
  ]
}` }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content.map(b => b.text || '').join('');
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());

    items = parsed.transactions || [];
    detectedDate = parsed.date_label || today;

    if (items.length === 0) throw new Error('거래 내역을 찾을 수 없습니다. 이미지를 확인해주세요.');

    document.getElementById('detected-date').textContent = detectedDate;
    renderItems();

    document.getElementById('data-card').style.display = 'block';
    document.getElementById('data-card').scrollIntoView({ behavior: 'smooth' });
    showStatus('scan-status', 'success', `✓ ${items.length}건 감지됨. 아래에서 확인 후 저장하세요.`);
    setStep(3);

  } catch (err) {
    showStatus('scan-status', 'error', '✗ ' + err.message);
    document.getElementById('scan-btn').disabled = false;
  }
}

// ── Render items ──────────────────────────────────────────────────────
function renderItems() {
  const list = document.getElementById('items-list');
  list.innerHTML = '';

  items.forEach((item, i) => {
    const catOptions = CATEGORIES.map(c =>
      `<option value="${c}" ${c === item.category ? 'selected' : ''}>${c}</option>`
    ).join('');

    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="item-header">
        <span class="item-num">항목 ${i + 1}</span>
        <button class="item-delete" onclick="deleteItem(${i})" title="삭제">✕</button>
      </div>
      <div class="item-grid">
        <div class="item-field full">
          <label>이름 (상호명)</label>
          <input type="text" value="${item.name || ''}"
            oninput="items[${i}].name = this.value" />
        </div>
        <div class="item-field">
          <label>일자</label>
          <input type="text" value="${item.date || ''}"
            oninput="items[${i}].date = this.value" />
        </div>
        <div class="item-field">
          <label>금액 (₩)</label>
          <input type="text" inputmode="numeric" value="${item.amount || ''}"
            oninput="items[${i}].amount = this.value" />
        </div>
        <div class="item-field full">
          <label>카테고리</label>
          <select onchange="items[${i}].category = this.value">
            ${catOptions}
          </select>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function deleteItem(i) {
  items.splice(i, 1);
  renderItems();
}

function addBlankItem() {
  items.push({ name: '', date: todayStr(), amount: '', category: '생활비' });
  renderItems();
  document.getElementById('items-list').lastElementChild
    ?.scrollIntoView({ behavior: 'smooth' });
}

// ── Save all to Notion ────────────────────────────────────────────────
async function saveAll() {
  const token = document.getElementById('notion-token').value.trim();
  const dbId  = document.getElementById('notion-db').value.trim().replace(/-/g, '');

  if (!token || !dbId) {
    showStatus('save-status', 'error', '⚠ 토큰과 DB ID를 입력해주세요.');
    return;
  }
  if (items.length === 0) {
    showStatus('save-status', 'error', '⚠ 저장할 항목이 없습니다.');
    return;
  }

  document.getElementById('save-btn').disabled = true;
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('save-status').className = 'status-bar';

  const results = [];

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const pct  = Math.round(((i) / items.length) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    showStatus('save-status', 'info', `저장 중… (${i+1}/${items.length})`, true);

    try {
      const props = {
        "이름": { "title": [{ "text": { "content": item.name || '(이름 없음)' } }] }
      };

      const num = parseFloat(String(item.amount).replace(/[^0-9.]/g, ''));
      if (!isNaN(num)) props["금액"] = { "number": num };

      if (item.date && /^\d{4}-\d{2}-\d{2}$/.test(item.date))
        props["일자"] = { "date": { "start": item.date } };

      if (item.category)
        props["카테고리"] = { "select": { "name": item.category } };

      // 결제수단 = 카드 (always)
      props["결제수단"] = { "select": { "name": "카드" } };

      const res = await fetch("https://api.notion.com/v1/pages", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Notion-Version": "2022-06-28",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ parent: { database_id: dbId }, properties: props })
      });

      const result = await res.json();
      if (result.object === 'error') throw new Error(result.message);

      results.push({ ok: true, name: item.name, url: result.url });
    } catch (err) {
      results.push({ ok: false, name: item.name, error: err.message });
    }

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progress-bar').style.width = '100%';

  // Render results
  const resultList = document.getElementById('result-list');
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'result-row ' + (r.ok ? 'ok' : 'fail');
    div.innerHTML = r.ok
      ? `<span>✓ ${r.name}</span><a href="${r.url}" target="_blank">↗ 열기</a>`
      : `<span>✗ ${r.name}: ${r.error}</span>`;
    resultList.appendChild(div);
  });

  const ok   = results.filter(r => r.ok).length;
  const fail = results.filter(r => !r.ok).length;

  if (fail === 0) {
    showStatus('save-status', 'success', `✓ 전체 ${ok}건 저장 완료!`);
    document.getElementById('save-btn').textContent = '+ 새 내역 등록';
    document.getElementById('save-btn').onclick = resetAll;
    document.getElementById('save-btn').disabled = false;
  } else {
    showStatus('save-status', 'warn', `⚠ ${ok}건 성공, ${fail}건 실패. 위에서 실패 항목을 확인하세요.`);
    document.getElementById('save-btn').textContent = '↩ 처음으로';
    document.getElementById('save-btn').onclick = resetAll;
    document.getElementById('save-btn').disabled = false;
  }
}

// ── Reset ─────────────────────────────────────────────────────────────
function resetAll() {
  retake();
  items = [];
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('save-btn').textContent = '✦ Notion에 전체 저장';
  document.getElementById('save-btn').onclick = saveAll;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
